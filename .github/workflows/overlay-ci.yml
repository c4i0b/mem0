name: Overlay CI

on:
  push:
    branches: [main]
    paths:
      - 'openmemory/api/app/**'
      - 'openmemory/api/tests/**'
      - 'openmemory/api/requirements*.txt'
      - 'openmemory/api/Dockerfile.standalone'
      - 'openmemory/api/entrypoint.sh'
      - 'start.sh'
      - 'stop.sh'
  pull_request:
    branches: [main]
    paths:
      - 'openmemory/api/app/**'
      - 'openmemory/api/tests/**'
      - 'openmemory/api/requirements*.txt'
      - 'openmemory/api/Dockerfile.standalone'
  workflow_dispatch:

jobs:
  overlay-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: openmemory/api/requirements.txt

      - name: Install dependencies
        working-directory: openmemory/api
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Run overlay regression tests (17 tests, <1s)
        working-directory: openmemory/api
        run: pytest tests/unit/test_overlay.py --noconftest -v
